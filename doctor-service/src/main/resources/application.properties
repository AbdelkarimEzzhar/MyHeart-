spring.application.name=doctor-service
server.port=8086

# Database
spring.datasource.url=jdbc:postgresql://doctor-db:5432/doctordb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=kafka:29092

# Consul Discovery
spring.cloud.consul.host=consul
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.instanceId=doctor-service:8086
spring.cloud.consul.discovery.serviceName=doctor-service
spring.cloud.consul.discovery.hostname=doctor-service
spring.cloud.consul.discovery.port=8086
spring.cloud.consul.discovery.healthCheckInterval=10s
spring.cloud.consul.discovery.healthCheckPath=/actuator/health
spring.cloud.service-registry.auto-registration.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.myheart=DEBUG
logging.level.org.springframework.kafka=INFO
